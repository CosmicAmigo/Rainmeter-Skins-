[Rainmeter]
Update=1000
AccurateText=1
BackgroundMode=2
SolidColor=0,0,0,1
; Massive width to prevent any possible cutoff
W=600
H=130
AlwaysOnTop=1

[Metadata]
Name=Simple Grid Monitor V13
Information=Dedicated Network line with full units.

; --- STYLES ---

[StyleText]
StringStyle=Bold
FontColor=255,255,255,255
FontFace=Segoe UI
FontSize=11
AntiAlias=1
DynamicVariables=1
InlineSetting=Shadow | 1 | 1 | 1 | 0,0,0,255
InlinePattern=.*
; This is the "Stop cutting me" setting
ClipString=0

[StyleSpacer]
StringStyle=Bold
FontColor=255,255,255,150
FontFace=Segoe UI
FontSize=11
AntiAlias=1
Text="|"
InlineSetting=Shadow | 1 | 1 | 1 | 0,0,0,255
InlinePattern=.*

; --- MEASURES ---

[MeasureCPU]
Measure=CPU

[MeasureGPU]
Measure=Plugin
Plugin=UsageMonitor
Alias=GPU

[MeasureFPS]
Measure=Plugin
Plugin=UsageMonitor
Alias=FPS

[MeasureRAMRawUsed]
Measure=PhysicalMemory

[MeasureRAMRawTotal]
Measure=PhysicalMemory
Total=1

[CalcRAMPercent]
Measure=Calc
Formula=(MeasureRAMRawUsed / MeasureRAMRawTotal * 100)

[CalcRAMUsedGB]
Measure=Calc
Formula=(MeasureRAMRawUsed / 1073741824)

[CalcRAMTotalGB]
Measure=Calc
Formula=(MeasureRAMRawTotal / 1073741824)

; --- NETWORK MEASURES ---
[MeasureNetIn]
Measure=NetIn
Interface=Best

[MeasureNetOut]
Measure=NetOut
Interface=Best

; --- ROW 1 (CPU | RAM % | FPS) ---

[LabelCPU]
Meter=String
MeterStyle=StyleText
X=10
Y=10
Text="CPU: [MeasureCPU:0]%"

[Spacer1]
Meter=String
MeterStyle=StyleSpacer
X=100
Y=10

[LabelRAMPercent]
Meter=String
MeterStyle=StyleText
StringAlign=Center
X=180
Y=10
MeasureName=CalcRAMPercent
Text="RAM: %1%"
NumOfDecimals=0

[Spacer2]
Meter=String
MeterStyle=StyleSpacer
X=260
Y=10

[LabelFPS]
Meter=String
MeterStyle=StyleText
X=280
Y=10
Text="FPS: [MeasureFPS:0]"

; --- ROW 2 (GPU | [USAGE/TOTAL] | SPACE) ---

[LabelGPU]
Meter=String
MeterStyle=StyleText
X=10
Y=10R
Text="GPU: [MeasureGPU:0]%"

[Spacer3]
Meter=String
MeterStyle=StyleSpacer
X=100
Y=0r

[LabelRAMUsage]
Meter=String
MeterStyle=StyleText
StringAlign=Center
X=180
Y=0r
MeasureName=CalcRAMUsedGB
MeasureName2=CalcRAMTotalGB
Text="[%1GB/%2GB]"
NumOfDecimals=1

; --- ROW 3 (NETWORK SPEEDS) ---

[LabelNet]
Meter=String
MeterStyle=StyleText
X=10
Y=12R
MeasureName=MeasureNetOut
MeasureName2=MeasureNetIn
; AutoScale=10 ensures it shows B, KB, MB, GB properly
AutoScale=10
NumOfDecimals=1
; Added "B/s" so you know it's Bytes, not bits
Text="U: %1B/s | D: %2B/s"